{% extends "base.html" %}
{% set editing = product is not none %}
{% block title %}{{ 'Редактировать продукт' if editing else 'Добавить продукт' }}{% endblock %}
{% block content %}
<div class="page-head"><h1>{{ 'Редактировать продукт' if editing else 'Новый продукт' }}</h1></div>

<form method="post" action="{{ ('/products/' ~ product.id ~ '/edit') if editing else '/products' }}" class="card form">
  <label>Название
    <input type="text" name="name" id="name" required autofocus value="{{ product.name if editing else '' }}">
  </label>

  <div class="row">
    <label>Количество
      <input type="number" name="quantity" value="{{ product.quantity if editing else 1 }}" min="0" step="0.1">
    </label>
    <label>Единица
      <select name="unit">
        {% for u in units %}<option value="{{ u.value }}" {{ 'selected' if editing and u == product.unit else '' }}>{{ u.value }}</option>{% endfor %}
      </select>
    </label>
  </div>

  <div class="row">
    <label>Категория
      <select name="category_id" id="category">
        <option value="">—</option>
        {% for c in categories %}<option value="{{ c.id }}" {{ 'selected' if editing and product.category_id == c.id else '' }}>{{ c.name }}</option>{% endfor %}
      </select>
    </label>
    <label>Место хранения
      <select name="location_id">
        <option value="">—</option>
        {% for l in locations %}<option value="{{ l.id }}" {{ 'selected' if editing and product.location_id == l.id else '' }}>{{ l.name }}</option>{% endfor %}
      </select>
    </label>
  </div>

  <div class="row">
    <label>Дата изготовления
      <input type="date" name="production_date" id="production_date" value="{{ product.production_date.isoformat() if editing and product.production_date else '' }}">
    </label>
    <label>Срок годности (до)
      <input type="date" name="expiry_date" id="expiry_date" value="{{ product.expiry_date.isoformat() if editing and product.expiry_date else '' }}">
      <small id="suggest-hint" class="muted"></small>
    </label>
  </div>

  <div class="row">
    <label>Хранить дней после вскрытия
      <input type="number" name="days_after_opening" min="0" placeholder="напр. 3"
             value="{{ product.days_after_opening if editing and product.days_after_opening is not none else '' }}">
    </label>
    <label>&nbsp;</label>
  </div>

  <label>Заметки
    <textarea name="notes" rows="2">{{ product.notes if editing and product.notes else '' }}</textarea>
  </label>

  <div class="form-actions">
    <button class="btn btn-primary" type="submit">{{ 'Сохранить изменения' if editing else 'Сохранить' }}</button>
    <a class="btn" href="/">Отмена</a>
  </div>
</form>

<script>
// Автоподсказка срока годности из словаря по названию/категории/дате изготовления.
const nameEl = document.getElementById('name');
const catEl = document.getElementById('category');
const prodEl = document.getElementById('production_date');
const expEl = document.getElementById('expiry_date');
const hint = document.getElementById('suggest-hint');

async function suggest() {
  if (!nameEl.value.trim()) return;
  const params = new URLSearchParams({ name: nameEl.value.trim() });
  if (catEl.selectedIndex > 0) params.append('category', catEl.options[catEl.selectedIndex].text);
  if (prodEl.value) params.append('production_date', prodEl.value);
  try {
    const r = await fetch('/api/suggest-expiry?' + params.toString());
    const data = await r.json();
    if (data.expiry_date) {
      hint.textContent = 'Предложено по словарю: ' + data.expiry_date;
      if (!expEl.value) expEl.value = data.expiry_date;
    } else {
      hint.textContent = '';
    }
  } catch (e) { /* тихо игнорируем */ }
}
nameEl.addEventListener('blur', suggest);
prodEl.addEventListener('change', suggest);
catEl.addEventListener('change', suggest);
</script>
{% endblock %}
