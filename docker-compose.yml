services:
  holodilnik:
    build: .
    container_name: smart_holodilnik
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/holodilnik.db
    volumes:
      - holodilnik_db:/data
    # Страховка от перерасхода RAM на слабом сервере (сервису хватает ~120 МБ).
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  holodilnik_db:
